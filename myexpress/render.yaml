services:
  - type: web
    name: web-hw4
    env: node
    plan: free
    buildCommand: npm install && npm run build-db && npm run crawl
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: RENDER_DISK_PATH
        value: /opt/render/project/src/data
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
